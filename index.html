<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn</title>
    <link rel="stylesheet" href="index.css"></link>
</head>
<body>
    <section class="container" id="container">
        <div class="left-section">
            <div class="header-container">
                <h1 class="title">Learn</h1>
                <p class="qutoe">Master the <span>skills</span> of tommorow, starting today.</p>
            </div>
            <div class="buttons-container">
                <button class="start-button" id="started">Get started</button>
                <button class="more-info-button"><a>Learn more</a></button>
            </div>
        </div>
        <div class="right-section">
            <img src="./assets/Student.png"/>
        </div>
    </section>
    <section class="login" id="login">
        <div class="close-container">
            <img src="assets/close.png" class="close" height="25px" width="25px" id="close"/>
        </div>
        <div class="bottom-login-container">
            <h2>Login</h2>
            <p class="login-qutoe">To get access to more learning features</p>
            <input placeholder="Email" id="email">
            <div class="password-wrapper">
                <input placeholder="Password" class="password" id="password"><img class="eye" src="assets/eye.png" width="18px" height="18px" />
            </div>
            <button class="login-button" id="login-button">Login</button>
            <p id="problem"></p>
        </div>
    </section>
    <script src="index.js"></script>
</body>
</html>
